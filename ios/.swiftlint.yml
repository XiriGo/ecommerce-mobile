# =============================================================================
# SwiftLint Configuration — Molt Marketplace iOS
# =============================================================================
# Strict FAANG-level rules (Google Swift Style + Airbnb standards)
# Reference: https://realm.github.io/SwiftLint/rule-directory.html
# =============================================================================

# --- Source inclusion / exclusion ---
included:
  - MoltMarketplace
  - MoltMarketplaceTests
  - MoltMarketplaceUITests

excluded:
  - MoltMarketplace.xcodeproj
  - Pods
  - .build
  - DerivedData
  - "**/.build"
  - "**/Package.swift"
  - "**/*.generated.swift"

# --- Analyzer rules (require compilation) ---
analyzer_rules:
  - capture_variable
  - unused_declaration
  - unused_import

# --- Disabled rules: keep all default rules enabled ---
disabled_rules: []

# --- Opt-in rules ---
opt_in_rules:
  # Safety
  - force_unwrapping
  - force_cast
  - force_try
  - implicitly_unwrapped_optional
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - overridden_super_call
  - prohibited_super_call
  - unowned_variable_capture
  - fatal_error_message
  - unavailable_function

  # Style & readability
  - implicit_return
  - trailing_comma
  - closure_spacing
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - vertical_whitespace_between_cases
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - redundant_type_annotation
  - modifier_order
  - attributes
  - sorted_first_last
  - yoda_condition
  - operator_usage_whitespace
  - number_separator
  - literal_expression_end_indentation
  - collection_alignment
  - indentation_width
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - return_value_from_void_function
  - prefer_zero_over_explicit_init
  - static_over_final_class

  # Performance & best practices
  - array_init
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_count
  - empty_string
  - empty_collection_literal
  - first_where
  - last_where
  - flatmap_over_map_reduce
  - reduce_boolean
  - reduce_into
  - sorted_imports
  - redundant_nil_coalescing
  - toggle_bool
  - joined_default_parameter
  - identical_operands
  - file_name_no_space

  # Closures
  - closure_body_length
  - closure_end_indentation

  # Access control
  - private_action
  - private_outlet
  - private_subject
  - explicit_acl
  - explicit_top_level_acl

  # Testing
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - single_test_class

  # Types
  - convenience_type
  - enum_case_associated_values_count
  - discouraged_assert
  - balanced_xctest_lifecycle
  - test_case_accessibility

  # SwiftUI / Combine
  - accessibility_label_for_image

  # Misc
  - expiring_todo
  - missing_docs
  - no_magic_numbers
  - strict_fileprivate

# =============================================================================
# Rule severity overrides — errors that block CI
# =============================================================================

force_cast: error
force_unwrapping: error
force_try: error

# =============================================================================
# Rule configuration
# =============================================================================

# --- Length limits ---
line_length:
  warning: 120
  error: 160
  ignores_urls: true
  ignores_comments: false
  ignores_interpolated_strings: true
  ignores_function_declarations: false

file_length:
  warning: 300
  error: 400
  ignore_comment_only_lines: true

type_body_length:
  warning: 250
  error: 350

function_body_length:
  warning: 40
  error: 60

closure_body_length:
  warning: 30
  error: 50

# --- Complexity ---
cyclomatic_complexity:
  warning: 8
  error: 10
  ignores_case_statements: true

function_parameter_count:
  warning: 5
  error: 7
  ignores_default_parameters: true

# --- Naming ---
type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 40
    error: 50
  validates_start_with_lowercase: error
  allowed_symbols: []

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 50
  excluded:
    - id
    - i
    - x
    - y
    - ok
  validates_start_with_lowercase:
    severity: warning

# --- Nesting ---
nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3
  check_nesting_in_closures_and_statements: true
  always_allow_one_type_in_functions: false

# --- Trailing comma ---
trailing_comma:
  mandatory_comma: true

# --- Indentation ---
indentation_width:
  indentation_width: 4
  include_comments: true
  include_compiler_directives: true
  include_multiline_strings: false

# --- Number separator ---
number_separator:
  minimum_length: 5
  minimum_fraction_length: 5

# --- Multiline arguments ---
multiline_arguments:
  first_argument_location: next_line
  only_enforce_after_first_closure_on_first_line: true

# --- Modifier order (Apple convention) ---
modifier_order:
  severity: warning

# --- Attributes ---
attributes:
  always_on_same_line:
    - '@IBAction'
    - '@IBOutlet'
    - '@IBDesignable'
    - '@IBInspectable'
    - '@objc'
    - '@nonobjc'
    - '@discardableResult'
    - '@inline'
    - '@inlinable'
    - '@available'
  always_on_line_above:
    - '@MainActor'
    - '@Observable'
    - '@propertyWrapper'
    - '@resultBuilder'
    - '@ViewBuilder'

# --- Sorted imports ---
sorted_imports:
  severity: warning

# --- Enum case associated values ---
enum_case_associated_values_count:
  warning: 4
  error: 6

# --- Missing docs (only for public API) ---
missing_docs:
  warning: open
  excludes_extensions: true
  excludes_inherited_types: true
  excludes_trivial_init: true

# --- Expiring TODOs ---
expiring_todo:
  approaching_expiry_severity: warning
  expired_severity: error
  date_format: "MM/dd/yyyy"
  approaching_expiry_threshold: 15
  date_separator: "/"
  date_delimiters:
    opening: "["
    closing: "]"

# --- Explicit ACL ---
explicit_acl:
  severity: warning

# =============================================================================
# Custom rules
# =============================================================================
custom_rules:
  # Prevent print() calls — use os.Logger instead
  no_print_statements:
    name: "No print statements"
    regex: '\bprint\s*\('
    message: "Use os.Logger for logging instead of print()."
    severity: warning

  # Prevent NSLog calls — use os.Logger instead
  no_nslog:
    name: "No NSLog"
    regex: 'NSLog\s*\('
    message: "Use os.Logger for logging instead of NSLog()."
    severity: warning

  # NOTE: The following rules are designed for Feature screens only, but SwiftLint
  # custom_rules don't support per-rule included/excluded paths. These rules should
  # be enforced by the reviewer agent and architecture tests instead:
  # - no_raw_progress_view_in_features: Use MoltLoadingView, not raw ProgressView
  # - no_raw_button_in_features: Use MoltButton, not raw Button
  # - no_hardcoded_colors_in_features: Use MoltColors, not Color(hex:)

# =============================================================================
# Reporter
# =============================================================================
reporter: xcode
