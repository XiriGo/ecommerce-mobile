name: XiriGoEcommerce
options:
  bundleIdPrefix: com.xirigo
  deploymentTarget:
    iOS: 17.0
  createIntermediateGroups: true
  defaultConfig: Debug
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1,2
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO
configs:
  Debug: debug
  Staging: release
  Release: release
configFiles:
  Debug: XiriGoEcommerce/Configuration/Debug.xcconfig
  Staging: XiriGoEcommerce/Configuration/Staging.xcconfig
  Release: XiriGoEcommerce/Configuration/Release.xcconfig
targets:
  XiriGoEcommerce:
    type: application
    platform: iOS
    sources:
      - path: XiriGoEcommerce
        excludes:
          - "**/.gitkeep"
          - "**/Configuration"
    resources:
      - path: XiriGoEcommerce/Resources
    info:
      path: XiriGoEcommerce/Resources/Info.plist
    settings:
      base:
        PRODUCT_NAME: XiriGoEcommerce
        PRODUCT_BUNDLE_IDENTIFIER: $(PRODUCT_BUNDLE_IDENTIFIER)
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_ASSET_PATHS: ""
        ENABLE_PREVIEWS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - package: Factory
        product: Factory
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
      - package: KeychainAccess
        product: KeychainAccess
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebaseRemoteConfig
      - package: Sentry
        product: Sentry
  XiriGoEcommerceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - XiriGoEcommerceTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.xirigo.ecommerce.tests
    dependencies:
      - target: XiriGoEcommerce
      - package: ViewInspector
        product: ViewInspector
      - package: SnapshotTesting
        product: SnapshotTesting
  XiriGoEcommerceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - XiriGoEcommerceUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.xirigo.ecommerce.uitests
    dependencies:
      - target: XiriGoEcommerce
packages:
  Factory:
    url: https://github.com/hmlongco/Factory
    from: 2.4.0
  Nuke:
    url: https://github.com/kean/Nuke
    from: 12.8.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: 4.2.2
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.7.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.40.0
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector
    from: 0.10.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
schemes:
  XiriGoEcommerce:
    build:
      targets:
        XiriGoEcommerce: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - XiriGoEcommerceTests
        - XiriGoEcommerceUITests
      codeCoverageTargets:
        - XiriGoEcommerce
      language: en
      region: US
      testPlans:
        - path: XiriGoEcommerce.xctestplan
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  XiriGoEcommerce-Staging:
    build:
      targets:
        XiriGoEcommerce: all
    run:
      config: Staging
    test:
      config: Staging
    profile:
      config: Staging
    analyze:
      config: Staging
    archive:
      config: Staging
