name: iOS CI

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
    paths:
      - 'ios/**'
      - 'shared/**'
      - '.github/workflows/ios-ci.yml'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'CLAUDE.md'
  pull_request:
    branches: [develop]
    paths:
      - 'ios/**'
      - 'shared/**'
      - '.github/workflows/ios-ci.yml'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'CLAUDE.md'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ━━━ Setup ━━━
  setup:
    name: Install Fastlane
    runs-on: macos-19-runner
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

  # ━━━ Stage 1: Lint ━━━
  lint:
    name: Lint (SwiftLint + SwiftFormat)
    runs-on: macos-19-runner
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane lint
        run: bundle exec fastlane ios lint
        working-directory: ios

  # ━━━ Stage 2: Build ━━━
  build:
    name: Build
    runs-on: macos-19-runner
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane build
        run: bundle exec fastlane ios build
        working-directory: ios

  # ━━━ Stage 3: Unit Tests + Coverage (Multi-Device) ━━━
  test:
    name: Unit Tests + Coverage (iPhone + iPad + Small)
    runs-on: macos-19-runner
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane test
        run: bundle exec fastlane ios test
        working-directory: ios

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-results
          path: |
            ios/fastlane/test_output/
            ios/fastlane/coverage.json
          retention-days: 14

  # ━━━ Stage 4: Thread Sanitizer (nightly or on-demand) ━━━
  sanitizer:
    name: Thread Sanitizer
    runs-on: macos-19-runner
    needs: build
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[sanitizer]')
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane sanitizer
        run: bundle exec fastlane ios sanitizer
        working-directory: ios
