name: Auto-Merge Agent PRs

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge on approval + checks pass
    runs-on: ubuntu-latest

    # Only run for PRs labeled with 'agent:pipeline'
    if: >-
      (
        github.event_name == 'pull_request_review' &&
        github.event.review.state == 'approved'
      ) ||
      (
        github.event_name == 'check_suite' &&
        github.event.check_suite.conclusion == 'success'
      )

    steps:
      - uses: actions/checkout@v4

      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            # For check_suite events, find the associated PR
            PR_NUMBER=$(gh pr list \
              --head "${{ github.event.check_suite.head_branch }}" \
              --state open \
              --json number \
              --jq '.[0].number // empty')
          fi

          if [[ -z "$PR_NUMBER" ]]; then
            echo "No open PR found. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for agent:pipeline label
        if: steps.pr.outputs.skip != 'true'
        id: label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HAS_LABEL=$(gh pr view ${{ steps.pr.outputs.number }} \
            --json labels \
            --jq '.labels[].name' | grep -c '^agent:pipeline$' || true)

          if [[ "$HAS_LABEL" -eq 0 ]]; then
            echo "PR #${{ steps.pr.outputs.number }} does not have 'agent:pipeline' label. Skipping."
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          else
            echo "PR #${{ steps.pr.outputs.number }} has 'agent:pipeline' label."
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify approval and checks
        if: steps.pr.outputs.skip != 'true' && steps.label.outputs.eligible == 'true'
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if PR has at least one approval
          APPROVALS=$(gh pr view ${{ steps.pr.outputs.number }} \
            --json reviewDecision \
            --jq '.reviewDecision')

          echo "Review decision: $APPROVALS"

          # Check if all required status checks pass
          CHECKS_STATE=$(gh pr checks ${{ steps.pr.outputs.number }} \
            --json state \
            --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length')

          echo "Failing/pending checks: $CHECKS_STATE"

          if [[ "$APPROVALS" == "APPROVED" && "$CHECKS_STATE" -eq 0 ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "PR is not ready for auto-merge yet."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        if: >-
          steps.pr.outputs.skip != 'true' &&
          steps.label.outputs.eligible == 'true' &&
          steps.verify.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Enabling auto-merge (squash) for PR #${{ steps.pr.outputs.number }}"
          gh pr merge ${{ steps.pr.outputs.number }} \
            --auto \
            --squash
