name: Android CI

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
    paths:
      - 'android/**'
      - 'shared/**'
      - '.github/workflows/android-ci.yml'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'CLAUDE.md'
  pull_request:
    branches: [develop]
    paths:
      - 'android/**'
      - 'shared/**'
      - '.github/workflows/android-ci.yml'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'CLAUDE.md'

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ktlint + detekt)
    runs-on: ubuntu-davinci
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane lint
        run: bundle exec fastlane android lint
        working-directory: android

  build:
    name: Build debug APK
    runs-on: ubuntu-davinci
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane build
        run: bundle exec fastlane android build
        working-directory: android

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/
          retention-days: 14

  test:
    name: Unit tests
    runs-on: ubuntu-davinci
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane test
        run: bundle exec fastlane android test
        working-directory: android

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          retention-days: 14
