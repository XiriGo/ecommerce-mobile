name: Android CI

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
    paths:
      - 'android/**'
      - 'shared/**'
      - '.github/workflows/android-ci.yml'
      - 'CLAUDE.md'
  pull_request:
    branches: [develop]
    paths:
      - 'android/**'
      - 'shared/**'
      - '.github/workflows/android-ci.yml'
      - 'CLAUDE.md'

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ktlint + detekt)
    runs-on: ubuntu-davinci
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run detekt
        run: ./gradlew detekt

  build:
    name: Build debug APK
    runs-on: ubuntu-davinci
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Assemble debug
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/
          retention-days: 14

  test:
    name: Unit tests
    runs-on: ubuntu-davinci
    needs: build
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          retention-days: 14
