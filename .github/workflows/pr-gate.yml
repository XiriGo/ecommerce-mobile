name: PR Gate

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Detect which paths changed to conditionally run platform checks
  # ------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - 'shared/**'
              - 'Gemfile'
              - 'Gemfile.lock'
              - 'CLAUDE.md'
              - '.github/workflows/android-ci.yml'
              - '.github/workflows/pr-gate.yml'
            ios:
              - 'ios/**'
              - 'shared/**'
              - 'Gemfile'
              - 'Gemfile.lock'
              - 'CLAUDE.md'
              - '.github/workflows/ios-ci.yml'
              - '.github/workflows/pr-gate.yml'

  # ------------------------------------------------------------------
  # Android checks
  # ------------------------------------------------------------------
  android-lint:
    name: 'Android: Lint'
    runs-on: ubuntu-davinci
    needs: changes
    if: needs.changes.outputs.android == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane lint
        run: bundle exec fastlane android lint
        working-directory: android

  android-build:
    name: 'Android: Build'
    runs-on: ubuntu-davinci
    needs: changes
    if: needs.changes.outputs.android == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane build
        run: bundle exec fastlane android build
        working-directory: android

  android-test:
    name: 'Android: Test'
    runs-on: ubuntu-davinci
    needs: android-build
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane test
        run: bundle exec fastlane android test
        working-directory: android

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-android-test-results
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          retention-days: 7

  # ------------------------------------------------------------------
  # iOS checks (self-hosted runner)
  # ------------------------------------------------------------------
  ios-lint:
    name: 'iOS: Lint'
    runs-on: macos-19-runner
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane lint
        run: bundle exec fastlane ios lint
        working-directory: ios

  ios-build:
    name: 'iOS: Build'
    runs-on: macos-19-runner
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane build
        run: bundle exec fastlane ios build
        working-directory: ios

  ios-test:
    name: 'iOS: Test (iPhone + iPad + Small)'
    runs-on: macos-19-runner
    needs: ios-build
    steps:
      - uses: actions/checkout@v4

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Fastlane test
        run: bundle exec fastlane ios test
        working-directory: ios

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-ios-test-results
          path: |
            ios/fastlane/test_output/
            ios/fastlane/coverage.json
          retention-days: 7

  # ------------------------------------------------------------------
  # Final gate — required status check for branch protection
  # ------------------------------------------------------------------
  pr-gate-result:
    name: PR Gate Result
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - android-lint
      - android-build
      - android-test
      - ios-lint
      - ios-build
      - ios-test
    steps:
      - name: Evaluate results
        run: |
          echo "=== PR Gate Summary ==="
          echo "Android changed: ${{ needs.changes.outputs.android }}"
          echo "iOS changed:     ${{ needs.changes.outputs.ios }}"
          echo ""

          FAILED=false

          # Check Android jobs (only if Android files changed)
          if [[ "${{ needs.changes.outputs.android }}" == "true" ]]; then
            for job in android-lint android-build android-test; do
              result="${{ needs[job].result || 'skipped' }}"
              echo "$job: $result"
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                FAILED=true
              fi
            done
          fi

          # Check iOS jobs (only if iOS files changed)
          if [[ "${{ needs.changes.outputs.ios }}" == "true" ]]; then
            for job in ios-lint ios-build ios-test; do
              result="${{ needs[job].result || 'skipped' }}"
              echo "$job: $result"
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                FAILED=true
              fi
            done
          fi

          echo ""
          if [[ "$FAILED" == "true" ]]; then
            echo "PR Gate: FAILED"
            exit 1
          else
            echo "PR Gate: PASSED"
          fi
