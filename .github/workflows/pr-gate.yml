name: PR Gate

on:
  pull_request:
    branches: [develop, main]

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # Android
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  # iOS
  SCHEME: MoltMarketplace
  DESTINATION: 'platform=iOS Simulator,name=iPhone 16,OS=18.0'

jobs:
  # ------------------------------------------------------------------
  # Detect which paths changed to conditionally run platform checks
  # ------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - 'shared/**'
              - 'CLAUDE.md'
              - '.github/workflows/android-ci.yml'
              - '.github/workflows/pr-gate.yml'
            ios:
              - 'ios/**'
              - 'shared/**'
              - 'CLAUDE.md'
              - '.github/workflows/ios-ci.yml'
              - '.github/workflows/pr-gate.yml'

  # ------------------------------------------------------------------
  # Android checks
  # ------------------------------------------------------------------
  android-lint:
    name: 'Android: Lint'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.android == 'true'
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run detekt
        run: ./gradlew detekt

  android-build:
    name: 'Android: Build'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.android == 'true'
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug
        run: ./gradlew assembleDebug

  android-test:
    name: 'Android: Test'
    runs-on: ubuntu-latest
    needs: android-build
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-android-test-results
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          retention-days: 7

  # ------------------------------------------------------------------
  # iOS checks
  # ------------------------------------------------------------------
  ios-lint:
    name: 'iOS: Lint'
    runs-on: macos-15
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install swiftlint swiftformat

      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
        working-directory: ios

      - name: SwiftFormat
        run: swiftformat --lint .
        working-directory: ios

  ios-build:
    name: 'iOS: Build'
    runs-on: macos-15
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('ios/Package.swift', 'ios/project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: |
          xcodebuild build \
            -scheme ${{ env.SCHEME }} \
            -destination '${{ env.DESTINATION }}' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO
        working-directory: ios

  ios-test:
    name: 'iOS: Test'
    runs-on: macos-15
    needs: ios-build
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('ios/Package.swift', 'ios/project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme ${{ env.SCHEME }} \
            -destination '${{ env.DESTINATION }}' \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO
        working-directory: ios

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-ios-test-results
          path: ios/TestResults.xcresult
          retention-days: 7

  # ------------------------------------------------------------------
  # Final gate — required status check for branch protection
  # ------------------------------------------------------------------
  pr-gate-result:
    name: PR Gate Result
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - android-lint
      - android-build
      - android-test
      - ios-lint
      - ios-build
      - ios-test
    steps:
      - name: Evaluate results
        run: |
          echo "=== PR Gate Summary ==="
          echo "Android changed: ${{ needs.changes.outputs.android }}"
          echo "iOS changed:     ${{ needs.changes.outputs.ios }}"
          echo ""

          FAILED=false

          # Check Android jobs (only if Android files changed)
          if [[ "${{ needs.changes.outputs.android }}" == "true" ]]; then
            for job in android-lint android-build android-test; do
              result="${{ needs[job].result || 'skipped' }}"
              echo "$job: $result"
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                FAILED=true
              fi
            done
          fi

          # Check iOS jobs (only if iOS files changed)
          if [[ "${{ needs.changes.outputs.ios }}" == "true" ]]; then
            for job in ios-lint ios-build ios-test; do
              result="${{ needs[job].result || 'skipped' }}"
              echo "$job: $result"
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                FAILED=true
              fi
            done
          fi

          echo ""
          if [[ "$FAILED" == "true" ]]; then
            echo "PR Gate: FAILED"
            exit 1
          else
            echo "PR Gate: PASSED"
          fi
