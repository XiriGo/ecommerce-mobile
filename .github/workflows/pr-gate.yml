name: PR Gate

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # Android
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  # iOS
  SCHEME: XiriGoEcommerce
  DESTINATION_IPHONE: 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest'
  DESTINATION_IPAD: 'platform=iOS Simulator,name=iPad Pro 13-inch (M5),OS=latest'

jobs:
  # ------------------------------------------------------------------
  # Detect which paths changed to conditionally run platform checks
  # ------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - 'shared/**'
              - 'CLAUDE.md'
              - '.github/workflows/android-ci.yml'
              - '.github/workflows/pr-gate.yml'
            ios:
              - 'ios/**'
              - 'shared/**'
              - 'CLAUDE.md'
              - '.github/workflows/ios-ci.yml'
              - '.github/workflows/pr-gate.yml'

  # ------------------------------------------------------------------
  # Android checks
  # ------------------------------------------------------------------
  android-lint:
    name: 'Android: Lint'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.android == 'true'
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run detekt
        run: ./gradlew detekt

  android-build:
    name: 'Android: Build'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.android == 'true'
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug
        run: ./gradlew assembleDebug

  android-test:
    name: 'Android: Test'
    runs-on: ubuntu-latest
    needs: android-build
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-android-test-results
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          retention-days: 7

  # ------------------------------------------------------------------
  # iOS checks (self-hosted runner)
  # ------------------------------------------------------------------
  ios-lint:
    name: 'iOS: Lint'
    runs-on: macos-19-runner
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
        working-directory: ios

      - name: SwiftFormat
        run: swiftformat --lint . --config .swiftformat
        working-directory: ios

  ios-build:
    name: 'iOS: Build'
    runs-on: macos-19-runner
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      - name: Build
        run: |
          xcodebuild build \
            -scheme ${{ env.SCHEME }} \
            -destination '${{ env.DESTINATION_IPHONE }}' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO
        working-directory: ios

  ios-test:
    name: 'iOS: Test (iPhone + iPad)'
    runs-on: macos-19-runner
    needs: ios-build
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      - name: Run tests on iPhone + iPad
        run: |
          xcodebuild test \
            -scheme ${{ env.SCHEME }} \
            -destination '${{ env.DESTINATION_IPHONE }}' \
            -destination '${{ env.DESTINATION_IPAD }}' \
            -parallel-testing-enabled YES \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO
        working-directory: ios

      - name: Check coverage threshold
        if: always()
        run: |
          xcrun xccov view --report TestResults.xcresult --json > coverage.json 2>/dev/null || true
          if [ -f coverage.json ]; then
            python3 -c "
          import json, sys
          data = json.load(open('coverage.json'))
          targets = data.get('targets', [])
          for t in targets:
              name = t.get('name', '')
              if 'XiriGoEcommerce' == name:
                  pct = t.get('lineCoverage', 0) * 100
                  print(f'Coverage: {pct:.1f}%')
                  if pct < 70:
                      print(f'FAIL: Coverage {pct:.1f}% is below 70% minimum')
                      sys.exit(1)
                  elif pct < 80:
                      print(f'WARNING: Coverage {pct:.1f}% is below 80% target')
                  else:
                      print(f'PASS: Coverage {pct:.1f}% meets threshold')
          " 2>/dev/null || echo "Coverage check skipped (parse error)"
          fi
        working-directory: ios

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-ios-test-results
          path: |
            ios/TestResults.xcresult
            ios/coverage.json
          retention-days: 7

  # ------------------------------------------------------------------
  # Final gate — required status check for branch protection
  # ------------------------------------------------------------------
  pr-gate-result:
    name: PR Gate Result
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - android-lint
      - android-build
      - android-test
      - ios-lint
      - ios-build
      - ios-test
    steps:
      - name: Evaluate results
        run: |
          echo "=== PR Gate Summary ==="
          echo "Android changed: ${{ needs.changes.outputs.android }}"
          echo "iOS changed:     ${{ needs.changes.outputs.ios }}"
          echo ""

          FAILED=false

          # Check Android jobs (only if Android files changed)
          if [[ "${{ needs.changes.outputs.android }}" == "true" ]]; then
            for job in android-lint android-build android-test; do
              result="${{ needs[job].result || 'skipped' }}"
              echo "$job: $result"
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                FAILED=true
              fi
            done
          fi

          # Check iOS jobs (only if iOS files changed)
          if [[ "${{ needs.changes.outputs.ios }}" == "true" ]]; then
            for job in ios-lint ios-build ios-test; do
              result="${{ needs[job].result || 'skipped' }}"
              echo "$job: $result"
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                FAILED=true
              fi
            done
          fi

          echo ""
          if [[ "$FAILED" == "true" ]]; then
            echo "PR Gate: FAILED"
            exit 1
          else
            echo "PR Gate: PASSED"
          fi
