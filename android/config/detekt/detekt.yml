# =============================================================================
# Detekt Configuration — Molt Marketplace Android
# =============================================================================
# Strict FAANG-level static analysis (Google + Meta + Airbnb standards)
# Reference: https://detekt.dev/docs/rules/
# =============================================================================

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: true

# =============================================================================
# Complexity Rules
# =============================================================================
complexity:
  active: true

  CognitiveComplexMethod:
    active: true
    threshold: 10
    excludes:
      - '**/test/**'
      - '**/androidTest/**'

  ComplexCondition:
    active: true
    threshold: 4

  ComplexInterface:
    active: true
    threshold: 10
    includeStaticDeclarations: false
    includePrivateDeclarations: false

  CyclomaticComplexMethod:
    active: true
    threshold: 10
    ignoreSingleWhenExpression: true
    ignoreSimpleWhenEntries: true
    ignoreNestingFunctions: false
    nestingFunctions: []

  LabeledExpression:
    active: true
    ignoredLabels: []

  LargeClass:
    active: true
    threshold: 400

  LongMethod:
    active: true
    threshold: 60
    ignoreAnnotated:
      - 'Composable'
      - 'Preview'

  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 8
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotated:
      - 'Composable'
      - 'Inject'

  MethodOverloading:
    active: true
    threshold: 6

  NamedArguments:
    active: true
    threshold: 3
    ignoreArgumentsMatchingNames: true

  NestedBlockDepth:
    active: true
    threshold: 4
    excludes:
      - '**/test/**'
      - '**/androidTest/**'

  NestedScopeFunctions:
    active: true
    threshold: 2
    functions:
      - 'kotlin.apply'
      - 'kotlin.run'
      - 'kotlin.with'
      - 'kotlin.let'
      - 'kotlin.also'

  ReplaceSafeCallChainWithRun:
    active: true

  StringLiteralDuplication:
    active: true
    threshold: 3
    ignoreAnnotation: true
    excludeStringsWithLessThan5Characters: true
    ignoreStringsRegex: '$^'

  TooManyFunctions:
    active: true
    thresholdInFiles: 15
    thresholdInClasses: 12
    thresholdInInterfaces: 10
    thresholdInObjects: 12
    thresholdInEnums: 8
    ignoreDeprecated: true
    ignorePrivate: false
    ignoreOverridden: false
    ignoreAnnotatedFunctions:
      - 'Preview'

# =============================================================================
# Coroutines Rules
# =============================================================================
coroutines:
  active: true

  GlobalCoroutineUsage:
    active: true

  InjectDispatcher:
    active: true
    dispatcherNames:
      - 'IO'
      - 'Default'
      - 'Unconfined'

  RedundantSuspendModifier:
    active: true

  SleepInsteadOfDelay:
    active: true

  SuspendFunSwallowedCancellation:
    active: true

  SuspendFunWithCoroutineScopeReceiver:
    active: true

  SuspendFunWithFlowReturnType:
    active: true

# =============================================================================
# Empty Blocks Rules
# =============================================================================
empty-blocks:
  active: true

  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|(ignore|expected).*'

  EmptyClassBlock:
    active: true

  EmptyDefaultConstructor:
    active: true

  EmptyDoWhileBlock:
    active: true

  EmptyElseBlock:
    active: true

  EmptyFinallyBlock:
    active: true

  EmptyForBlock:
    active: true

  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

  EmptyIfBlock:
    active: true

  EmptyInitBlock:
    active: true

  EmptyKtFile:
    active: true

  EmptySecondaryConstructor:
    active: true

  EmptyTryBlock:
    active: true

  EmptyWhenBlock:
    active: true

  EmptyWhileBlock:
    active: true

# =============================================================================
# Exceptions Rules
# =============================================================================
exceptions:
  active: true

  ExceptionRaisedInUnexpectedLocation:
    active: true
    methodNames:
      - 'equals'
      - 'finalize'
      - 'hashCode'
      - 'toString'

  InstanceOfCheckForException:
    active: true

  NotImplementedDeclaration:
    active: true

  ObjectExtendsThrowable:
    active: true

  PrintStackTrace:
    active: true

  RethrowCaughtException:
    active: true

  ReturnFromFinally:
    active: true
    ignoreLabeled: false

  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - 'InterruptedException'
      - 'MalformedURLException'
      - 'NumberFormatException'
      - 'ParseException'
    allowedExceptionNameRegex: '_|(ignore|expected).*'

  ThrowingExceptionFromFinally:
    active: true

  ThrowingExceptionInMain:
    active: true

  ThrowingExceptionsWithoutMessageOrCause:
    active: true
    excludes: []
    exceptions:
      - 'ArrayIndexOutOfBoundsException'
      - 'Exception'
      - 'IllegalArgumentException'
      - 'IllegalMonitorStateException'
      - 'IllegalStateException'
      - 'IndexOutOfBoundsException'
      - 'NullPointerException'
      - 'RuntimeException'
      - 'Throwable'

  ThrowingNewInstanceOfSameException:
    active: true

  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'ArrayIndexOutOfBoundsException'
      - 'Error'
      - 'Exception'
      - 'IllegalMonitorStateException'
      - 'NullPointerException'
      - 'IndexOutOfBoundsException'
      - 'RuntimeException'
      - 'Throwable'
    allowedExceptionNameRegex: '_|(ignore|expected).*'

  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - 'Error'
      - 'Exception'
      - 'RuntimeException'
      - 'Throwable'

# =============================================================================
# Naming Rules
# =============================================================================
naming:
  active: true

  BooleanPropertyNaming:
    active: true
    allowedPattern: '^(is|has|are|can|should|was|will|do)'

  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'

  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
    privateParameterPattern: '[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'

  EnumNaming:
    active: true
    enumEntryPattern: '[A-Z][a-zA-Z0-9]*'

  ForbiddenClassName:
    active: true
    forbiddenName:
      - 'Util'
      - 'Utils'
      - 'Helper'
      - 'Helpers'
      - 'Processor'

  FunctionMaxLength:
    active: true
    maximumFunctionNameLength: 40
    excludes:
      - '**/test/**'
      - '**/androidTest/**'

  FunctionMinLength:
    active: true
    minimumFunctionNameLength: 3

  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'
    ignoreAnnotated:
      - 'Composable'
      - 'Test'

  FunctionParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'

  InvalidPackageDeclaration:
    active: true
    rootPackage: 'com.molt.marketplace'
    requireRootInDeclaration: true

  LambdaParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*|_'

  MatchingDeclarationName:
    active: true
    mustBeFirst: true

  MemberNameEqualsClassName:
    active: true
    ignoreOverridden: true

  NoNameShadowing:
    active: true

  NonBooleanPropertyPrefixedWithIs:
    active: true

  ObjectPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Za-z0-9]*'
    propertyPattern: '[A-Z][_A-Za-z0-9]*'
    privatePropertyPattern: '_?[a-zA-Z][_A-Za-z0-9]*'

  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'

  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Za-z0-9]*'
    propertyPattern: '[A-Z][_A-Za-z0-9]*'
    privatePropertyPattern: '_?[a-zA-Z][A-Za-z0-9]*'

  VariableMaxLength:
    active: true
    maximumVariableNameLength: 40

  VariableMinLength:
    active: true
    minimumVariableNameLength: 2
    ignoreAnnotated: []

  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
    privateVariablePattern: '_?[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'

# =============================================================================
# Performance Rules
# =============================================================================
performance:
  active: true

  ArrayPrimitive:
    active: true

  CouldBeSequence:
    active: true
    threshold: 3

  ForEachOnRange:
    active: true
    excludes: []

  SpreadOperator:
    active: true
    excludes: []

  UnnecessaryPartOfBinaryExpression:
    active: true

  UnnecessaryTemporaryInstantiation:
    active: true

# =============================================================================
# Potential Bugs Rules
# =============================================================================
potential-bugs:
  active: true

  AvoidReferentialEquality:
    active: true
    forbiddenTypePatterns:
      - 'kotlin.String'

  CastNullableToNonNullableType:
    active: true

  CastToNullableType:
    active: false

  Deprecation:
    active: true

  DontDowncastCollectionTypes:
    active: true

  DoubleMutabilityForCollection:
    active: true
    mutableTypes:
      - 'kotlin.collections.MutableList'
      - 'kotlin.collections.MutableMap'
      - 'kotlin.collections.MutableSet'
      - 'java.util.ArrayList'
      - 'java.util.LinkedList'
      - 'java.util.HashMap'
      - 'java.util.LinkedHashMap'
      - 'java.util.HashSet'
      - 'java.util.LinkedHashSet'

  ElseCaseInsteadOfExhaustiveWhen:
    active: true
    ignoredSubjectTypes: []

  EqualsAlwaysReturnsTrueOrFalse:
    active: true

  EqualsWithHashCodeExist:
    active: true

  ExitOutsideMain:
    active: true

  ExplicitGarbageCollectionCall:
    active: true

  HasPlatformType:
    active: true

  IgnoredReturnValue:
    active: true
    restrictToConfig: true
    returnValueAnnotations:
      - 'CheckResult'
      - 'CheckReturnValue'

  ImplicitDefaultLocale:
    active: true

  ImplicitUnitReturnType:
    active: true
    allowExplicitReturnType: true

  InvalidRange:
    active: true

  IteratorHasNextCallsNextMethod:
    active: true

  IteratorNotThrowingNoSuchElementException:
    active: true

  LateinitUsage:
    active: true
    ignoreAnnotated:
      - 'Inject'
      - 'Mock'
      - 'InjectMockKs'
      - 'Rule'
    ignoreOnClassesPattern: ''

  MapGetWithNotNullAssertionOperator:
    active: true

  MissingPackageDeclaration:
    active: true
    excludes: []

  NullCheckOnMutableProperty:
    active: true

  NullableToStringCall:
    active: true

  PropertyUsedBeforeDeclaration:
    active: true

  UnconditionalJumpStatementInLoop:
    active: true

  UnnecessaryNotNullCheck:
    active: true

  UnnecessaryNotNullOperator:
    active: true

  UnnecessarySafeCall:
    active: true

  UnreachableCatchBlock:
    active: true

  UnreachableCode:
    active: true

  UnsafeCallOnNullableType:
    active: true
    excludes: []

  UnsafeCast:
    active: true

  UnusedUnaryOperator:
    active: true

  UselessPostfixExpression:
    active: true

# =============================================================================
# Style Rules
# =============================================================================
style:
  active: true

  AlsoCouldBeApply:
    active: true

  BracesOnIfStatements:
    active: true
    singleLine: 'consistent'
    multiLine: 'always'

  BracesOnWhenStatements:
    active: true
    singleLine: 'necessary'
    multiLine: 'consistent'

  CascadingCallWrapping:
    active: true
    includeElvis: true

  CanBeNonNullable:
    active: true

  ClassOrdering:
    active: true

  CollapsibleIfStatements:
    active: true

  DataClassContainsFunctions:
    active: true
    conversionFunctionPrefix:
      - 'to'

  DataClassShouldBeImmutable:
    active: true

  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 4

  DoubleNegativeLambda:
    active: true
    negativeFunctions:
      - reason: 'Use `takeIf` instead'
        value: 'takeUnless'
      - reason: 'Use `all` instead'
        value: 'none'

  EqualsNullCall:
    active: true

  EqualsOnSignatureLine:
    active: true

  ExplicitCollectionElementAccessMethod:
    active: true

  ExplicitItLambdaParameter:
    active: true

  ExpressionBodySyntax:
    active: true
    includeLineWrapping: false

  ForbiddenAnnotation:
    active: true
    annotations:
      - reason: 'Use `@Suppress` with a specific rule ID instead.'
        value: 'SuppressWarnings'

  ForbiddenComment:
    active: true
    comments:
      - reason: 'Use TODO with a ticket reference instead.'
        value: 'FIXME:'
      - reason: 'Use TODO with a ticket reference instead.'
        value: 'HACK:'
      - reason: 'Remove before release.'
        value: 'STOPSHIP:'
    allowedPatterns: ''

  ForbiddenImport:
    active: true
    imports:
      - 'kotlinx.coroutines.GlobalScope'
    forbiddenPatterns: ''

  ForbiddenMethodCall:
    active: true
    methods:
      - reason: 'Use Timber for logging in production code.'
        value: 'kotlin.io.println'
      - reason: 'Use Timber for logging in production code.'
        value: 'kotlin.io.print'
      - reason: 'Use structured concurrency. Never use runBlocking in production code.'
        value: 'kotlinx.coroutines.runBlocking'

  ForbiddenSuppress:
    active: false

  ForbiddenVoid:
    active: true
    ignoreOverridden: false
    ignoreUsageInGenerics: false

  FunctionOnlyReturningConstant:
    active: true
    ignoreOverridableFunction: true
    ignoreActualFunction: true
    excludedFunctions: []
    ignoreAnnotated:
      - 'Composable'

  LoopWithTooManyJumpStatements:
    active: true
    maxJumpCount: 2

  MagicNumber:
    active: true
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
      - '**/*Test.kt'
      - '**/designsystem/theme/**'
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
    ignoreRanges: true
    ignoreExtensionFunctions: true
    ignoreAnnotated:
      - 'Composable'
      - 'Preview'

  MandatoryBracesLoops:
    active: true

  MaxChainedCallsOnSameLine:
    active: true
    maxChainedCalls: 5

  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: true
    excludeRawStrings: true

  MayBeConst:
    active: true

  ModifierOrder:
    active: true

  MultilineLambdaItParameter:
    active: true

  MultilineRawStringIndentation:
    active: true
    indentSize: 4

  NoTabs:
    active: true

  NullableBooleanCheck:
    active: true

  ObjectLiteralToLambda:
    active: true

  OptionalAbstractKeyword:
    active: true

  OptionalUnit:
    active: true

  PreferToOverPairSyntax:
    active: true

  ProtectedMemberInFinalClass:
    active: true

  RedundantExplicitType:
    active: true

  RedundantHigherOrderMapUsage:
    active: true

  RedundantVisibilityModifierRule:
    active: true

  ReturnCount:
    active: true
    max: 3
    excludedFunctions:
      - 'equals'
    excludeLabeled: false
    excludeReturnFromLambda: true
    excludeGuardClauses: true

  SafeCast:
    active: true

  SerialVersionUIDInSerializableClass:
    active: false

  SpacingBetweenPackageAndImports:
    active: true

  ThrowsCount:
    active: true
    max: 3
    excludeGuardClauses: true

  TrailingWhitespace:
    active: true

  TrimMultilineRawString:
    active: true

  UnderscoresInNumericLiterals:
    active: true
    acceptableLength: 5
    allowNonStandardGrouping: false

  UnnecessaryAbstractClass:
    active: true

  UnnecessaryAnnotationUseSiteTarget:
    active: true

  UnnecessaryApply:
    active: true

  UnnecessaryBackticks:
    active: true

  UnnecessaryBracesAroundTrailingLambda:
    active: true

  UnnecessaryFilter:
    active: true

  UnnecessaryInheritance:
    active: true

  UnnecessaryInnerClass:
    active: true

  UnnecessaryLet:
    active: true

  UnnecessaryParentheses:
    active: true
    allowForUnclearPrecedence: false

  UntilInsteadOfRangeTo:
    active: true

  UnusedImports:
    active: true

  UnusedParameter:
    active: true
    allowedNames: 'ignored|expected'

  UnusedPrivateClass:
    active: true

  UnusedPrivateMember:
    active: true
    allowedNames: ''
    ignoreAnnotated:
      - 'Preview'

  UnusedPrivateProperty:
    active: true
    allowedNames: '_|ignored|expected'

  UseAnyOrNoneInsteadOfFind:
    active: true

  UseArrayLiteralsInAnnotations:
    active: true

  UseCheckNotNull:
    active: true

  UseCheckOrError:
    active: true

  UseDataClass:
    active: true
    allowVars: false

  UseEmptyCounterpart:
    active: true

  UseIfEmptyOrIfBlank:
    active: true

  UseIfInsteadOfWhen:
    active: true
    ignoreWhenContainingVariableDeclaration: true

  UseIsNullOrEmpty:
    active: true

  UseLet:
    active: true

  UseOrEmpty:
    active: true

  UseRequire:
    active: true

  UseRequireNotNull:
    active: true

  UseSumOfInsteadOfFlatMapSize:
    active: true

  UselessCallOnNotNull:
    active: true

  UtilityClassWithPublicConstructor:
    active: true

  VarCouldBeVal:
    active: true
    ignoreLateinitVar: true

  WildcardImport:
    active: true
    excludeImports: []
